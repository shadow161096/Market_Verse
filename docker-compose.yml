version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: marketverse-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-marketverse_secret}
      POSTGRES_DB: ${DB_NAME:-marketverse}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-marketverse}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: marketverse-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --requirepass ${REDIS_PASS:-marketverse_redis_secret}
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASS:-marketverse_redis_secret}", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
