version: '3.8'

services:
  # 1. Reverse Proxy (Nginx) - Handles incoming traffic on port 80/443
  nginx:
    image: nginx:alpine
    container_name: marketverse-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      # Optional: Add SSL cert volumes if not using Cloudflare/AWS ALB
      # - ./certbot/conf:/etc/letsencrypt
      # - ./certbot/www:/var/www/certbot
    depends_on:
      - api
      - web
    restart: always

  # 2. Frontend (Next.js)
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketverse-web
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://api.marketverse.com/api/v1
    restart: always

  # 3. Backend API (NestJS)
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: marketverse-api
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@postgres:5432/${DB_NAME}?schema=public
      - REDIS_URL=redis://:${REDIS_PASS}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  # 4. Primary Database (PostgreSQL)
  postgres:
    image: postgres:16-alpine
    container_name: marketverse-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # 5. Cache / Session Store (Redis)
  redis:
    image: redis:7-alpine
    container_name: marketverse-redis
    volumes:
      - redisdata:/data
    command: redis-server --requirepass ${REDIS_PASS} --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  pgdata:
  redisdata:
