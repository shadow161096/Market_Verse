name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Build Application
        working-directory: ./backend
        run: npm run build

      - name: Run Prisma Generate
        working-directory: ./backend
        run: npx prisma generate

      # Note: This step assumes deployment to a Docker-based PaaS like Render, Railway, or AWS ECS.
      # You would configure your specific deployment action here.
      # Example: Docker Build & Push to Registry
      - name: Build Docker Image
        working-directory: ./backend
        run: docker build -t marketverse-api .
      
